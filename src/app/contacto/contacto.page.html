<ion-header [translucent]="true" class="ion-no-border">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Contacto</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">
  <!-- WHY: Tarjeta informativa de contacto minimalista. HOW: Usando ion-list con lineas limpias -->
  <ion-card class="contact-card">
    <ion-card-header>
      <ion-card-title>Información de Contacto</ion-card-title>
      <p class="subtitle">Comunícate conmigo a través de los siguientes canales.</p>
    </ion-card-header>

    <ion-card-content>
      <ion-list lines="none">
        
        <ion-item href="https://mail.google.com/mail/?view=cm&fs=1&to=omarrivas042@gmail.com" target="_blank" class="contact-item">
          <ion-icon slot="start" name="mail-outline" color="primary"></ion-icon>
          <ion-label>
            <h3>Correo Electrónico</h3>
            <p>omarrivas042&#64;gmail.com</p>
          </ion-label>
        </ion-item>

        <ion-item href="https://github.com/theomarbass" target="_blank" class="contact-item">
          <ion-icon slot="start" name="logo-github" color="dark"></ion-icon>
          <ion-label>
            <h3>GitHub</h3>
            <p>github.com/theomarbass</p>
          </ion-label>
        </ion-item>

        <ion-item href="https://instagram.com/omar_jesusr" target="_blank" class="contact-item">
          <ion-icon slot="start" name="logo-instagram" color="danger"></ion-icon>
          <ion-label>
            <h3>Instagram</h3>
            <p>&#64;omar_jesusr</p>
          </ion-label>
        </ion-item>
        
      </ion-list>
    </ion-card-content>
  </ion-card>
</ion-content>

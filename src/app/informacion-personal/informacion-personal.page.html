<ion-header [translucent]="true" class="ion-no-border">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Perfil</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">
  <!-- WHY: Tarjeta principal del perfil. HOW: Se usa ion-card para agrupar la información -->
  <ion-card class="profile-card">
    <ion-card-header class="ion-text-center">
      <div class="avatar-container">
        <ion-avatar>
          <img src="https://github.com/theomarbass.png" alt="Omar Rivas" />
        </ion-avatar>
      </div>
      <ion-card-title>Omar Rivas</ion-card-title>
      <p class="subtitle">Estudiante de Ingeniería en Informática</p>
    </ion-card-header>

    <ion-card-content>
      <ion-list lines="none">

        <ion-item>
          <ion-icon name="calendar-outline" slot="start" color="primary"></ion-icon>
          <ion-label>
            <h3>Edad</h3>
            <p>36 años</p>
          </ion-label>
        </ion-item>

        <ion-item>
          <ion-icon name="location-outline" slot="start" color="primary"></ion-icon>
          <ion-label>
            <h3>Residencia</h3>
            <p>Caracas</p>
          </ion-label>
        </ion-item>

        <ion-item>
          <ion-icon name="heart-outline" slot="start" color="primary"></ion-icon>
          <ion-label class="ion-text-wrap">
            <h3>Gustos</h3>
            <div class="chip-container">
              <ion-chip color="primary">Tecnologías Ecológicas</ion-chip>
              <ion-chip color="secondary">Música Clásica</ion-chip>
              <ion-chip color="tertiary">Programación</ion-chip>
            </div>
          </ion-label>
        </ion-item>

        <ion-item href="https://github.com/theomarbass" target="_blank">
          <ion-icon name="logo-github" slot="start" color="dark"></ion-icon>
          <ion-label>
            <h3>GitHub</h3>
            <p>github.com/theomarbass</p>
          </ion-label>
        </ion-item>

        <ion-item href="https://mail.google.com/mail/?view=cm&fs=1&to=omarrivas042@gmail.com" target="_blank">
          <ion-icon name="mail-outline" slot="start" color="primary"></ion-icon>
          <ion-label>
            <h3>Correo Electrónico</h3>
            <p>omarrivas042&#64;gmail.com</p>
          </ion-label>
        </ion-item>

      </ion-list>
    </ion-card-content>
  </ion-card>
</ion-content>

<app-footer></app-footer>

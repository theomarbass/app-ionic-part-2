<ion-app>
  <!-- Menú lateral principal -->
  <ion-menu contentId="main-content" type="overlay">
    <ion-header>
      <ion-toolbar color="primary">
        <ion-title>Menú</ion-title>
      </ion-toolbar>
    </ion-header>
    <ion-content>
      <ion-list>
        <!-- Ítems del menú con enrutamiento -->
        <ion-item routerLink="/inicio" routerDirection="root" routerLinkActive="selected" detail="false">
          <ion-icon slot="start" name="home-outline"></ion-icon>
          <ion-label>Inicio</ion-label>
        </ion-item>
        <ion-item routerLink="/informacion-personal" routerDirection="root" routerLinkActive="selected" detail="false">
          <ion-icon slot="start" name="person-outline"></ion-icon>
          <ion-label>Información Personal</ion-label>
        </ion-item>
        <ion-item routerLink="/contacto" routerDirection="root" routerLinkActive="selected" detail="false">
          <ion-icon slot="start" name="mail-outline"></ion-icon>
          <ion-label>Contacto</ion-label>
        </ion-item>
      </ion-list>
    </ion-content>
  </ion-menu>

  <!-- Contenedor principal de rutas -->
  <ion-router-outlet id="main-content"></ion-router-outlet>
</ion-app>
